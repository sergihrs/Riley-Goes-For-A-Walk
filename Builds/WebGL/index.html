<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unity WebGL Player | Riley Goes For A Walk</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      /* Prefer the dynamic viewport height on mobile browsers. */
      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: #000;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
        outline: none;
      }

      #fullscreen-button {
        position: fixed;
        right: calc(16px + env(safe-area-inset-right));
        bottom: calc(16px + env(safe-area-inset-bottom));
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      #fullscreen-button:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 2px;
      }

      #fullscreen-button svg {
        width: 22px;
        height: 22px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
    </div>

    <button id="fullscreen-button" type="button" aria-label="Pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <script src="Build/rileyhtml.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");
      var fullscreenButton = document.querySelector("#fullscreen-button");
      var unityInstance = null;

      // Unity creates a Promise; keep the instance so the fullscreen button can use SetFullscreen().
      createUnityInstance(canvas, {
        dataUrl: "Build/rileyhtml.data",
        frameworkUrl: "Build/rileyhtml.framework.js",
        codeUrl: "Build/rileyhtml.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "BarnacleNeuron",
        productName: "Riley Goes For A Walk",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then(function(instance) {
        unityInstance = instance;
      }).catch(function(message) {
        console.error(message);
      });

      function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
      }

      function enterFullscreen() {
        if (unityInstance && typeof unityInstance.SetFullscreen === 'function') {
          unityInstance.SetFullscreen(1);
          return;
        }
        var target = container || canvas;
        if (target.requestFullscreen) return target.requestFullscreen();
        if (target.webkitRequestFullscreen) return target.webkitRequestFullscreen();
        if (target.msRequestFullscreen) return target.msRequestFullscreen();
      }

      function exitFullscreen() {
        if (document.exitFullscreen) return document.exitFullscreen();
        if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
        if (document.msExitFullscreen) return document.msExitFullscreen();
      }

      fullscreenButton.addEventListener('click', function() {
        if (isFullscreen()) {
          exitFullscreen();
        } else {
          enterFullscreen();
        }
      });
    </script>
  </body>
</html>
